<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Viewer</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: #000;
  user-select: none;
  -webkit-user-select: none;
}

/* TOP BAR */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 45px;
  background: #2c2c2c;
  border-bottom: 3px solid #f4c542;
  display: flex;
  align-items: center;
  padding: 0 15px;
  z-index: 999;
  gap: 10px;
}

.top-bar button {
  background: #e0e0e0;
  border: 1px solid #999;
  padding: 5px 14px;
  font-size: 13px;
  cursor: pointer;
  border-radius: 3px;
  font-family: Arial, sans-serif;
}

.top-bar button:hover {
  background: #c0c0c0;
}

.top-bar button:disabled {
  background: #555;
  color: #888;
  border-color: #666;
  cursor: not-allowed;
}

.page-info {
  color: #ffffff;
  font-family: Arial, sans-serif;
  font-size: 14px;
  margin-left: 10px;
}

/* DOCUMENT AREA */
.viewer {
  position: fixed;
  top: 48px;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #1a1a1a;
  overflow: hidden;
}

.viewer img {
  max-width: 95%;
  max-height: 95%;
  pointer-events: none;
  -webkit-user-drag: none;
  user-drag: none;
  border: 1px solid #333;
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

/* FULLSCREEN PROMPT */
.fullscreen-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

.fullscreen-overlay h2 {
  color: #fff;
  font-family: Arial, sans-serif;
  margin-bottom: 20px;
  font-size: 20px;
}

.fullscreen-overlay button {
  background: #f4c542;
  color: #000;
  border: none;
  padding: 15px 40px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 5px;
  cursor: pointer;
  font-family: Arial, sans-serif;
}

.fullscreen-overlay button:hover {
  background: #e0b530;
}

.hidden {
  display: none !important;
}
</style>

</head>
<body>

<!-- FULLSCREEN PROMPT (appears first) -->
<div class="fullscreen-overlay" id="overlay">
  <h2>Click below to open document viewer</h2>
  <button onclick="openFullscreen()">Open Document</button>
</div>

<!-- TOP BAR -->
<div class="top-bar" id="topbar">
  <button id="prevBtn" onclick="changePage(-1)">Previous</button>
  <button id="nextBtn" onclick="changePage(1)">Next</button>
  <span class="page-info" id="pageInfo">Page: 1 / 1</span>
</div>

<!-- DOCUMENT VIEWER -->
<div class="viewer" id="viewer">
  <img id="docImage" src="" draggable="false">
</div>

<script>
// =============================================
// PUT YOUR IMAGE FILE NAMES HERE
// =============================================
// If you have 1 image:
//   const pages = ["document.png"];
//
// If you have multiple pages:
//   const pages = ["page1.png", "page2.png", "page3.png"];

const pages = ["document.png"];

// =============================================

let currentPage = 0;

function showPage(index) {
  const img = document.getElementById("docImage");
  const info = document.getElementById("pageInfo");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  img.src = pages[index];
  info.textContent = "Page: " + (index + 1) + " / " + pages.length;

  prevBtn.disabled = (index === 0);
  nextBtn.disabled = (index === pages.length - 1);
}

function changePage(direction) {
  const newPage = currentPage + direction;
  if (newPage >= 0 && newPage < pages.length) {
    currentPage = newPage;
    showPage(currentPage);
  }
}

function openFullscreen() {
  const elem = document.documentElement;

  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }

  document.getElementById("overlay").classList.add("hidden");
  showPage(0);
}

// If user exits fullscreen, show overlay again
document.addEventListener("fullscreenchange", function() {
  if (!document.fullscreenElement) {
    document.getElementById("overlay").classList.remove("hidden");
  }
});

document.addEventListener("webkitfullscreenchange", function() {
  if (!document.webkitFullscreenElement) {
    document.getElementById("overlay").classList.remove("hidden");
  }
});

// Block right click
document.addEventListener("contextmenu", function(e) {
  e.preventDefault();
});

// Block selection
document.onselectstart = function() {
  return false;
};

// Block keyboard shortcuts
document.addEventListener("keydown", function(e) {
  // Block Ctrl+S, Ctrl+P, Ctrl+U
  if (e.ctrlKey && (e.key === "s" || e.key === "p" || e.key === "u")) {
    e.preventDefault();
    return false;
  }
  // Block F12
  if (e.key === "F12") {
    e.preventDefault();
    return false;
  }
  // Block Ctrl+Shift+I
  if (e.ctrlKey && e.shiftKey && e.key === "I") {
    e.preventDefault();
    return false;
  }
  // Block Ctrl+Shift+J
  if (e.ctrlKey && e.shiftKey && e.key === "J") {
    e.preventDefault();
    return false;
  }
});
</script>

</body>
</html>
